# Apex System 配置文件
server:
  port: 8200

spring:
  application:
    name: apex-system
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: apex-admin
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
    alibaba:
      seata:
        tx-service-group: apex-admin-tx-group

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/apex_admin?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0

# MyBatis Plus 配置
mybatis-plus:
  # 搜索指定包别名
  type-aliases-package: com.apex.system.domain
  # 配置 mapper 的扫描
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      # 主键策略
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: delFlag
      # 逻辑删除值
      logic-delete-value: 2
      # 逻辑未删除值
      logic-not-delete-value: 0
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Sa-Token 配置
sa-token:
  # Token 名称
  token-name: Authorization
  # Token 有效期 (30天)
  timeout: 2592000
  # Token 最低活跃频率 (单位: 秒)
  active-timeout: -1
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: true
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false

# 日志配置
logging:
  level:
    com.apex.system: debug
    com.apex.system.mapper: debug
