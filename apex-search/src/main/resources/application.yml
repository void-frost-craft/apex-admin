# Apex Search 配置文件
server:
  port: 8700

spring:
  application:
    name: apex-search
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: apex-admin
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858

  # Elasticsearch 配置
  elasticsearch:
    uris: http://127.0.0.1:9200
    username:
    password:

# Sa-Token 配置
sa-token:
  # Token 名称
  token-name: Authorization
  # Token 有效期 (30天)
  timeout: 2592000
  # Token 最低活跃频率 (单位: 秒)
  active-timeout: -1
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: true
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false

# 日志配置
logging:
  level:
    com.apex.search: debug
